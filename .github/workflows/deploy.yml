# ============================================================
#  Ibiza Mi Vida — GitHub Actions CI/CD
#
#  Triggers:
#    • Push to main → build Docker image → push to Docker Hub
#      → SSH into server → pull new image → restart container
#    • Supabase webhook → same pipeline (content update)
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    DOCKER_HUB_USERNAME
#    DOCKER_HUB_TOKEN
#    SERVER_HOST          (IP or hostname of your VPS)
#    SERVER_USER          (SSH user, e.g. root or ubuntu)
#    SERVER_SSH_KEY       (private SSH key, paste full content)
#    SERVER_PORT          (SSH port, default 22)
# ============================================================

name: Deploy Ibiza Mi Vida CMS

on:
  push:
    branches: [main]
  workflow_dispatch:            # allow manual trigger from GitHub UI

env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/ibiza-cms
  IMAGE_TAG:  ${{ github.sha }}

jobs:

  # ── 1. LINT & VALIDATE ──────────────────────────────────
  validate:
    name: Validate HTML & config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check CMS file exists
        run: |
          test -f index.html && echo "✅ index.html found" || (echo "❌ index.html missing" && exit 1)

      - name: Check file size (warn if >5MB)
        run: |
          SIZE=$(wc -c < index.html)
          echo "CMS file size: ${SIZE} bytes"
          if [ $SIZE -gt 5242880 ]; then
            echo "⚠️  Warning: CMS file is larger than 5MB"
          fi

      - name: Validate Docker Compose
        run: docker compose config --quiet && echo "✅ docker-compose.yml valid"

  # ── 1.5. APPLY DATABASE MIGRATIONS ──────────────────────
  migrate:
    name: Push Supabase Migrations
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link and Push Migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            supabase link --project-ref qqstpsvalgdbjacdkmmk --password "$SUPABASE_DB_PASSWORD"
            supabase db push
          else
            echo "⚠️  SUPABASE_ACCESS_TOKEN or SUPABASE_DB_PASSWORD secrets not configured in GitHub. Skipping migrations."
          fi

  # ── 2. BUILD & PUSH DOCKER IMAGE ────────────────────────
  build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [validate, migrate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context:    .
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Summary
        run: |
          echo "### 🐳 Docker image pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ── 3. DEPLOY TO SERVER ──────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    environment: production       # enables manual approval gate in GitHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy config files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || 22 }}
          source:   "docker-compose.yml,nginx.conf"
          target:   "/opt/ibiza-cms"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            echo "🚀 Starting deploy..."

            cd /opt/ibiza-cms

            # Pull latest image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Graceful restart (zero-downtime)
            docker compose up -d --no-deps cms

            # Wait for health check
            sleep 5
            docker inspect --format='{{.State.Health.Status}}' ibiza-cms | grep -q "healthy" \
              && echo "✅ Container healthy" \
              || echo "⚠️  Health check pending — check logs with: docker logs ibiza-cms"

            # Cleanup old images
            docker image prune -f

            echo "✅ Deploy complete — $(date)"

      - name: Notify success
        if: success()
        run: |
          echo "### ✅ Deploy successful" >> $GITHUB_STEP_SUMMARY
          echo "**Server:** \`${{ secrets.SERVER_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** \`$(date -u)\`" >> $GITHUB_STEP_SUMMARY

      - name: Notify failure
        if: failure()
        run: |
          echo "### ❌ Deploy FAILED" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
