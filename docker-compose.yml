version: "3.9"

# ============================================================
#  Ibiza Mi Vida — Docker Compose
#  Services: CMS (nginx), Postgres (local dev only)
#  Production uses Supabase cloud — postgres only for local dev
# ============================================================

services:

  # ── CMS static app served by nginx ──────────────────────
  cms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ibiza-cms
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    volumes:
      - ./ibiza-cms.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ibiza-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Local Postgres (dev only — prod uses Supabase cloud) ─
  db:
    image: postgres:15-alpine
    container_name: ibiza-db
    restart: unless-stopped
    profiles: ["dev"]          # only starts with: docker compose --profile dev up
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ibizamivida}
      POSTGRES_USER:     ${POSTGRES_USER:-ibiza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - ibiza-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ibiza}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Watchtower — auto-pull new Docker images on push ────
  watchtower:
    image: containrrr/watchtower
    container_name: ibiza-watchtower
    restart: unless-stopped
    profiles: ["prod"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
    networks:
      - ibiza-net

volumes:
  postgres_data:

networks:
  ibiza-net:
    driver: bridge
